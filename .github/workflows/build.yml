# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - v*
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: 3.12
    - uses: pre-commit/action@v3.0.1

  build-wheels:
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest, ubuntu-24.04-arm]
        python-version: [39, 310, 311, 312, 313, 314]

    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        env:
          CIBW_BUILD: cp${{matrix.python-version}}-*
        uses: pypa/cibuildwheel@v3.4.1

      - name: Build sdist
        run: |
          pip install build 
          python -m build . --sdist -o wheelhouse
        if: ${{ matrix.python-version == '312' && runner.os == 'Linux' }}

      - name: Rename Wheels
        run: |
          python ci/rename_wheels.py
        if: runner.os == 'Linux'

      - name: Upload Binaries
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: ./wheelhouse/*.whl

  test-wheels:
    needs: [build-wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [3.9, '3.10', '3.11', '3.12', '3.13', '3.14']
        os: [macos-latest, ubuntu-latest, windows-latest, ubuntu-24.04-arm]

    steps:
    - uses: actions/checkout@v6
      with:
        path: implicit_source
    - uses: actions/download-artifact@v8
      with:
        pattern: wheels-${{ matrix.os }}-*
        merge-multiple: true
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r implicit_source/requirements.txt
    - name: Install ANN Libraries
      run: pip install annoy nmslib
      if: ${{ matrix.python-version != '3.14' && runner.os == 'Linux' }}
    - name: Install wheel
      run: |
        pip install --force-reinstall --no-deps --no-index --find-links . implicit
    - name: Run unittests
      run: |
        python -m pytest implicit_source/tests

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [test-wheels]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: fnkr/github-action-ghr@v1.3
        env:
          GHR_PATH: .
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Push to PyPi
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          pip install --upgrade wheel pip setuptools twine
          twine upload *
          rm *
