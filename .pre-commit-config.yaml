repos:
      - repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.15.12
        hooks:
        - id: ruff-check
          types_or: [ python, pyi, jupyter, pyproject ]
          args: [ --fix ]
        - id: ruff-format
      - repo: https://github.com/codespell-project/codespell
        rev: v2.2.4
        hooks:
        - id: codespell
      - repo: https://github.com/pre-commit/mirrors-clang-format
        rev: v22.1.4
        hooks:
        - id: clang-format
          files: \.(cu|cuh|h|cpp)$

